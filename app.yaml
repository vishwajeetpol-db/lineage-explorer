# This file is ONLY used for manual deployment (databricks apps create / deploy).
# For standard deployment, use databricks.yml via:
#   databricks bundle deploy -t dev --profile <your-profile> --var warehouse_id=<id>
#
# If you must deploy manually, replace <your-warehouse-id> below.
command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000
env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "<your-warehouse-id>"
