command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000
env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "your_warehouse_id"
  # When running as a Databricks App, auth is automatic via the app's
  # built-in service principal — no need to set credentials below.
  #
  # For standalone deployment outside Databricks Apps, uncomment and set:
  # - name: DATABRICKS_HOST
  #   value: "https://your-workspace.cloud.databricks.com"
  # - name: DATABRICKS_CLIENT_ID
  #   value: "your-sp-client-id"
  # - name: DATABRICKS_CLIENT_SECRET
  #   value: "your-sp-secret"
