bundle:
  name: lineage-explorer

variables:
  warehouse_id:
    description: "SQL Warehouse ID for executing queries (required)"

targets:
  dev:
    mode: development
    default: true
    # No hardcoded host — uses CLI profile:
    #   databricks bundle deploy -t dev --profile <your-profile> --var warehouse_id=<id>
    resources:
      apps:
        lineage-explorer:
          name: lineage-explorer-dev
          description: "Unity Catalog Lineage Explorer - Interactive DAG visualization"
          source_code_path: .
          resources:
            - name: sql-warehouse
              sql_warehouse:
                id: ${var.warehouse_id}
                permission: CAN_USE
          config:
            command:
              - uvicorn
              - backend.main:app
              - --host
              - 0.0.0.0
              - --port
              - "8000"
            env:
              - name: DATABRICKS_WAREHOUSE_ID
                value: ${var.warehouse_id}
              - name: RATE_LIMIT_MAX_REQUESTS
                value: "200"

  prod:
    mode: production
    # No hardcoded host — uses CLI profile:
    #   databricks bundle deploy -t prod --profile <your-profile> --var warehouse_id=<id>
    resources:
      apps:
        lineage-explorer:
          name: lineage-explorer
          description: "Unity Catalog Lineage Explorer - Interactive DAG visualization"
          source_code_path: .
          resources:
            - name: sql-warehouse
              sql_warehouse:
                id: ${var.warehouse_id}
                permission: CAN_USE
          config:
            command:
              - uvicorn
              - backend.main:app
              - --host
              - 0.0.0.0
              - --port
              - "8000"
            env:
              - name: DATABRICKS_WAREHOUSE_ID
                value: ${var.warehouse_id}
